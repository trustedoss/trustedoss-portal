<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustedOSS Portal — bootstrap</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
      }
      main {
        max-width: 640px;
        padding: 32px;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 4px 0; color: #475569; }
      code { font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>TrustedOSS Portal — frontend bootstrap</h1>
      <p>Phase 0 PR #2 (Vite container only).</p>
      <p>React 18 + shadcn/ui + Tailwind + i18n land in PR #3.</p>
      <p>API: <code>http://localhost:8000/health</code></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
