[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s
output_encoding = utf-8

# DATABASE_URL is resolved at runtime in alembic/env.py via core.config.database_url_sync().
# The sqlalchemy.url field is intentionally left blank.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
