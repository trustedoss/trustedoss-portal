# TrustedOSS Portal — Locust base config.
#
# Defaults match the SLO scenario from CLAUDE.md §3:
#   * 50 concurrent users (AuthenticatedUser dominant; ScanTriggerUser
#     ramps in proportionally because Locust spawns by user-class
#     weight)
#   * 5 users / s spawn rate so the ramp-up window is 10 s
#   * 10 minute run-time (long enough for steady-state + p95 settling)
#   * Web UI on the default 8089 port — accessible from the host as
#     http://localhost:8089 once docker-compose.load.yml is up.
#
# Override at the command line for ad-hoc runs:
#   locust -f locustfile.py --host=https://staging.trustedoss.example \
#          --users 200 --spawn-rate 10 --run-time 30m

users = 50
spawn-rate = 5
host = http://localhost:8000
run-time = 10m
