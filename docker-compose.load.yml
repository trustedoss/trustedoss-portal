# TrustedOSS Portal — Locust load testing harness.
#
# NOT wired into CI (chore PR #25 / Chore I in docs/chore-backlog.md).
# Bring this stack up alongside the dev stack on a beefy host or
# staging environment:
#
#   docker-compose -f docker-compose.dev.yml up -d
#   docker-compose -f docker-compose.load.yml up
#
# Locust dashboard: http://localhost:8089
# See tests/load/README.md for the full operator runbook.
#
# Image pin: locustio/locust 2.31.8 (CLAUDE.md core rule #9 — no :latest
# tags). Bump deliberately when the SLO scenario is re-baselined.

services:
  locust-master:
    image: locustio/locust:2.31.8
    container_name: trustedoss-locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./tests/load:/mnt/locust:ro
    command: >-
      -f /mnt/locust/locustfile.py
      --config /mnt/locust/locust.conf
      --master
    # Use the host network so the master can reach the dev stack's
    # backend on localhost:8000 (matches the locust.conf default host).
    # Workers attach to the master via the bridge, not the host.
    network_mode: host

  locust-worker-1:
    image: locustio/locust:2.31.8
    container_name: trustedoss-locust-worker-1
    volumes:
      - ./tests/load:/mnt/locust:ro
    command: >-
      -f /mnt/locust/locustfile.py
      --worker
      --master-host=localhost
    depends_on:
      - locust-master
    network_mode: host

  locust-worker-2:
    image: locustio/locust:2.31.8
    container_name: trustedoss-locust-worker-2
    volumes:
      - ./tests/load:/mnt/locust:ro
    command: >-
      -f /mnt/locust/locustfile.py
      --worker
      --master-host=localhost
    depends_on:
      - locust-master
    network_mode: host
