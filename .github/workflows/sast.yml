name: SAST

# Phase 8 PR #24 — Static Application Security Testing.
#
# bandit  — Python AST scanner for common security smells (hardcoded
#           passwords, weak crypto primitives, eval / exec usage).
# semgrep — pattern-based scanner with the auto-config rules tailored to
#           Python + JS / TS web stacks. Surfaces OWASP Top 10 patterns
#           that bandit cannot reach.
#
# Both jobs run on every push to main and every pull request. They report
# findings as SARIF artifacts which GitHub renders inline in the security
# tab and on the PR. We start in advisory mode (severity-level=WARNING for
# semgrep, --severity-level=high for bandit) so existing code does not
# block. Phase 8 PR #25 flips bandit/semgrep to HARD FAIL on High+ once
# the inventory is clean.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: sast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: bandit (backend)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: python -m pip install bandit==1.8.0

      - name: Run bandit (advisory, JSON output)
        working-directory: apps/backend
        # JSON output never fails to write; SARIF output silently aborts
        # when the legacy `--severity-level` filter is active and there
        # are no high-severity findings, so we use JSON and skip the
        # SARIF upload step. Operators read the bandit summary in the
        # workflow log and the JSON artifact below.
        run: |
          bandit -r . \
            --exclude ./tests,./alembic/versions \
            --severity-level high \
            --format json \
            --output bandit.json \
            || echo "::warning::bandit reported high-severity findings — advisory in PR #24"

      - name: Upload bandit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: apps/backend/bandit.json
          if-no-files-found: warn
          retention-days: 14

  semgrep:
    name: semgrep
    runs-on: ubuntu-22.04
    # Container removed — `semgrep ci` inside the official container hit
    # `dubious ownership` on /__w/... and dropped the SARIF before the
    # uploader could read it. The pip-install path on a stock runner
    # writes the SARIF reliably.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: python -m pip install semgrep==1.96.0

      - name: Run semgrep (advisory)
        # `--config=auto` picks the OSS rule packs matching the languages
        # it detects (Python + TypeScript here). --severity=ERROR limits
        # noise to highest-severity findings; WARNING/INFO findings are
        # still emitted to the SARIF for review.
        run: |
          semgrep scan \
            --config=auto \
            --severity=ERROR \
            --sarif --output=semgrep.sarif \
            --error \
            || echo "::warning::semgrep reported findings — advisory in PR #24"

      - name: Upload semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          if-no-files-found: warn
          retention-days: 14
